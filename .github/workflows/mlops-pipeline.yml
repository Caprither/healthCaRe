name: MLOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-fastapi:
    name: Run Pytest on FastAPI
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code source depuis le repo GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Installer Python 3.11 (la même version que ton Dockerfile)
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Accélère les prochaines exécutions

      # 3. Installer les dépendances de l'API et de test
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pandas numpy scikit-learn joblib prometheus-client pydantic
          pip install pytest httpx

      # 4. Exécuter les tests unitaires
      - name: Run Pytest
        env:
          # On définit des variables d'environnement si l'API en a besoin pendant les tests
          PYTHONPATH: .
        run: |
          pytest tests/ -v