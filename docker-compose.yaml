version: '3.8'
services:
  airflow:
    image: apache/airflow:2.7.1-python3.10
    container_name: airflow_mlops_manager
    restart: always
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
    volumes:
      # Mounts your entire project directory inside the container
      - .:/opt/airflow
      - ./dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    command: >
      bash -c "pip install pandas xgboost lightgbm mlflow joblib &&
               airflow db init && 
               airflow users create --username admin --firstname Moham --lastname MLOps --role Admin --email admin@hospital.com --password admin && 
               airflow standalone"